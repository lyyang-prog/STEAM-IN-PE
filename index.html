<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>AI 動作感應遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@latest/dist/teachablemachine-pose.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>AI 動作感應遊戲</h1>
      <button type="button" onclick="init()">開始連線攝像頭</button>
      <div id="status">準備就緒，請點擊按鈕</div>

      <div style="position: relative; margin: 20px 0">
        <canvas id="canvas"></canvas>
      </div>

      <div id="label-container" style="font-size: 20px; color: #555"></div>
      <h2 id="score-display" style="font-size: 40px; color: red">分數：0</h2>
    </main>

    <script src="script.js"></script>
  </body>
</html>
