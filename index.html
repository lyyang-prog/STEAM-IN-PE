<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 氣球打擊王 - 三代難度挑戰版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <style>
        body {
            background: radial-gradient(circle at center, #1a102f 0%, #05070c 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        main {
            width: 95%;
            max-width: 950px;
            text-align: center;
            background: rgba(20, 26, 44, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.6rem;
            color: #ffde59; 
            text-shadow: 0 0 12px rgba(255, 222, 89, 0.5);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 8px 0;
            font-weight: 900;
        }

        /* 難度選擇按鈕容器 */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 24px;
            color: #05070c;
            border: none;
            border-radius: 50px; 
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 1px;
        }

        /* 三種難度按鈕主題 */
        .btn-easy { background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .btn-normal { background: linear-gradient(135deg, #ffde59 0%, #ff914d 100%); box-shadow: 0 0 15px rgba(255, 145, 77, 0.4); }
        .btn-hard { background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); color: #fff; box-shadow: 0 0 15px rgba(225, 29, 72, 0.4); }

        button:active {
            transform: scale(0.95);
        }

        #status {
            font-size: 0.85rem;
            color: #93c5fd; 
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
            height: 18px;
            letter-spacing: 1px;
        }

        .score-card {
            margin-bottom: 10px;
            background: rgba(9, 11, 20, 0.85);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 65vw; 
        }

        .score-box {
            text-align: center;
            flex: 1;
        }

        .label {
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 1px;
            margin-bottom: 2px;
            font-weight: 600;
        }

        #score-display {
            font-size: 1.8rem;
            margin: 0;
            color: #4ade80; 
            font-weight: 900;
        }

        #time-display {
            font-size: 1.8rem;
            margin: 0;
            color: #ff914d; 
            font-weight: 900;
        }

        #label-container {
            font-size: 0.95rem;
            color: #22d3ee;
            font-weight: 800;
        }

        .canvas-container {
            width: 65vw;
            height: 48vh;
            background: #020617;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #475569;
            box-sizing: border-box;
            line-height: 0;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 12, 0.97);
            border-radius: 24px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #game-over-screen h2 {
            color: #ef4444;
            font-size: 2.2rem;
            margin: 0 0 8px 0;
            text-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
        }

        #final-score {
            font-size: 3.5rem;
            color: #4ade80;
            font-weight: 900;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <main>
        <h1>🎈 氣球打擊王 🎈</h1>
        <div class="btn-group" id="menu-buttons">
            <button class="btn-easy" onclick="selectDifficulty('easy')">簡單模式</button>
            <button class="btn-normal" onclick="selectDifficulty('normal')">普通模式</button>
            <button class="btn-hard" onclick="selectDifficulty('hard')">困難模式</button>
        </div>
        <div id="status">請選擇難度開啟熱血 BGM 並展開極限格鬥！</div>
        
        <div class="score-card">
            <div class="score-box">
                <div class="label">當前得分</div>
                <h2 id="score-display">0 / --</h2>
            </div>
            <div class="score-box" style="border-left: 1px solid #273549; border-right: 1px solid #273549;">
                <div class="label">剩餘時間</div>
                <h2 id="time-display">60s</h2>
            </div>
            <div class="score-box">
                <div class="label">AI 動作偵測</div>
                <div id="label-container">等待中...</div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div id="game-over-screen">
            <h2>K.O. 挑戰結束</h2>
            <div class="label">最終格鬥總分</div>
            <div id="final-score">0</div>
            <button type="button" class="btn-normal" style="color: #000;" onclick="backToMenu()">返回大廳</button>
        </div>
    </main>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/Bcp6i6fs_/";

let model, webcam, ctx, canvas, maxPredictions;

let score = 0;
let lastStatus = "準備"; 
let isPunchCooldown = false;
let isGameRunning = false;
let isCameraInitialized = false; 

let notes = [];       
let particles = [];   
let targetY;          

let timeLeft = 60;
let timerInterval = null;
let speedMultiplier = 1.0; 

// 🎯 難度參數控制
let currentDifficulty = "normal"; 
let totalBalloons = 50; 
let targetMaxScore = 500; 
let difficultySpeedBase = 1.0; // 速度權重（簡單慢、困難快）

let spawnedBalloonsCount = 0;
let balloonSpawnTimeline = []; 

let lastSide = ""; 
let sideStreak = 0; 

// 🔊 音效與 3 種音樂控制
let audioCtx = null;
let bgmInterval = null;
let selectedTrack = 0; 

// 玩家點選難度按鈕觸發
function selectDifficulty(diff) {
    currentDifficulty = diff;
    
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    // 設定難度配置
    if (diff === 'easy') {
        totalBalloons = 40;
        targetMaxScore = 400;
        difficultySpeedBase = 0.75; // 簡單：速度打 75 折
    } else if (diff === 'normal') {
        totalBalloons = 50;
        targetMaxScore = 500;
        difficultySpeedBase = 1.0;  // 普通：正常速
    } else if (diff === 'hard') {
        totalBalloons = 60;
        targetMaxScore = 600;
        difficultySpeedBase = 1.35; // 困難：基礎速度直接乘 1.35 倍！
    }

    document.getElementById("menu-buttons").style.display = "none";
    
    selectedTrack = Math.floor(Math.random() * 3);
    startFullMatchBGM();
    initOrRestart();
}

// 🎵 演算法隨機音樂合成器
function startFullMatchBGM() {
    if (bgmInterval) clearInterval(bgmInterval);
    
    let step = 0;
    const trackNames = ["『疾走電子流』", "『重低音轟炸』", "『熱血交響龐克』"];
    const diffNames = { easy: "【簡單】", normal: "【普通】", hard: "【困難】" };
    document.getElementById("status").innerText = "🥊 " + diffNames[currentDifficulty] + " 播放中：" + trackNames[selectedTrack];

    bgmInterval = setInterval(() => {
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        let time = audioCtx.currentTime;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();

        if (selectedTrack === 0) {
            const notes = [110, 110, 130, 146, 165, 165, 196, 220]; 
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(notes[step % notes.length] / 2, time);
            gain.gain.setValueAtTime(0.12, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
            if (step % 4 === 2) playSnareDrum(180, 0.08, time);
        } 
        else if (selectedTrack === 1) {
            const notes = [98, 98, 98, 116, 87, 87, 116, 146]; 
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(notes[step % notes.length] / 2, time);
            gain.gain.setValueAtTime(0.1, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.25);
            if (step % 2 === 1) playSnareDrum(120, 0.1, time);
        } 
        else {
            const notes = [130, 165, 196, 165, 220, 196, 261, 220]; 
            osc.type = 'sawtooth';
            let freq = notes[step % notes.length];
            if (step % 8 >= 4) freq *= 1.2; 
            osc.frequency.setValueAtTime(freq / 2, time);
            gain.gain.setValueAtTime(0.09, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
            if (step % 4 === 0) playSnareDrum(250, 0.06, time);
        }

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.25);
        step++;
    }, 140); 
}

function playSnareDrum(pitch, volume, time) {
    let snareOsc = audioCtx.createOscillator();
    let snareGain = audioCtx.createGain();
    snareOsc.type = 'triangle';
    snareOsc.frequency.setValueAtTime(pitch, time);
    snareOsc.frequency.exponentialRampToValueAtTime(60, time + 0.1);
    snareGain.gain.setValueAtTime(volume, time);
    snareGain.gain.exponentialRampToValueAtTime(0.01, time + 0.12);
    snareOsc.connect(snareGain);
    snareGain.connect(audioCtx.destination);
    snareOsc.start(time);
    snareOsc.stop(time + 0.12);
}

// 💥 演算法音效合成器：氣球爆破 + 重拳打擊感
function playHitSound() {
    if (!audioCtx) return;
    let time = audioCtx.currentTime;
    
    let punchOsc = audioCtx.createOscillator();
    let punchGain = audioCtx.createGain();
    punchOsc.type = 'sine'; 
    punchOsc.frequency.setValueAtTime(160, time);
    punchOsc.frequency.exponentialRampToValueAtTime(40, time + 0.15); 
    punchGain.gain.setValueAtTime(0.4, time);
    punchGain.gain.exponentialRampToValueAtTime(0.01, time + 0.18);
    punchOsc.connect(punchGain);
    punchGain.connect(audioCtx.destination);
    punchOsc.start(time);
    punchOsc.stop(time + 0.18);

    let bufferSize = audioCtx.sampleRate * 0.1; 
    let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    let data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1; 
    }
    let noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = buffer;
    let noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'highpass'; 
    noiseFilter.frequency.setValueAtTime(1000, time);
    let noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.25, time);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
    noiseNode.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noiseNode.start(time);
    noiseNode.stop(time + 0.08);
}

// 🎯 動態依據氣球顆數分配時間軸
function generateRandomTimeline() {
    balloonSpawnTimeline = [];
    spawnedBalloonsCount = 0;
    for (let i = 0; i < totalBalloons; i++) {
        let randomSecond = 1.5 + Math.random() * 52.5;
        balloonSpawnTimeline.push(randomSecond);
    }
    balloonSpawnTimeline.sort((a, b) => a - b);
}

async function initOrRestart() {
    if (isCameraInitialized) {
        startGameLogic();
        return;
    }

    document.getElementById("status").innerText = "正在點亮拳館燈光 (開啟鏡頭)...";
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    try {
        canvas = document.getElementById("canvas");
        canvas.width = 800;
        canvas.height = 600;
        ctx = canvas.getContext("2d");
        targetY = canvas.height * 0.8; 
        
        const size = 400;
        const flip = true; 
        webcam = new tmPose.Webcam(size, size, flip); 
        
        await webcam.setup({ facingMode: "user" }); 
        await webcam.play();
        
        document.getElementById("status").innerText = "裁判就位，正在讀取 AI 動作模組...";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        isCameraInitialized = true;
        startGameLogic();
    } catch (e) {
        console.error(e);
        document.getElementById("status").innerText = "錯誤: 無法開啟鏡頭。";
        document.getElementById("menu-buttons").style.display = "flex";
    }
}

function startGameLogic() {
    score = 0;
    timeLeft = 60;
    speedMultiplier = 1.0;
    notes = [];
    particles = [];
    lastSide = "";
    sideStreak = 0;
    
    generateRandomTimeline(); 
    
    document.getElementById("score-display").innerText = "0 / " + targetMaxScore;
    document.getElementById("time-display").innerText = timeLeft + "s";
    document.getElementById("time-display").style.color = "#ff914d"; 
    document.getElementById("game-over-screen").style.display = "none";

    isGameRunning = true;
    
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time-display").innerText = timeLeft + "s";
        
        // 時間倒數加速機制
        speedMultiplier = 1.0 + (60 - timeLeft) * 0.035; 
        
        if (timeLeft <= 10) {
            document.getElementById("time-display").style.color = "#ef4444";
        }

        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);

    window.requestAnimationFrame(gameLoop);
}

function endGame() {
    isGameRunning = false;
    clearInterval(timerInterval);
    document.getElementById("status").innerText = "🔔 挑戰結束！";
    document.getElementById("final-score").innerText = score + " / " + targetMaxScore;
    document.getElementById("game-over-screen").style.display = "flex";
}

// 結算後回到主選單重選難度
function backToMenu() {
    document.getElementById("game-over-screen").style.display = "none";
    document.getElementById("menu-buttons").style.display = "flex";
    document.getElementById("status").innerText = "請選擇難度開啟熱血 BGM 並展開極限格鬥！";
    document.getElementById("score-display").innerText = "0 / --";
}

async function gameLoop(timestamp) {
    if (!isGameRunning) return;

    webcam.update(); 
    await predict(); 
    updateAndSpawnLogic(); 
    drawGame();      
    
    window.requestAnimationFrame(gameLoop);
}

function updateAndSpawnLogic() {
    let currentElapsedSecond = 60 - timeLeft; 
    
    if (spawnedBalloonsCount < totalBalloons) {
        let nextSpawnTime = balloonSpawnTimeline[spawnedBalloonsCount];
        
        if (currentElapsedSecond >= nextSpawnTime) {
            let currentSide = Math.random() > 0.5 ? "左" : "右";
            
            if (currentSide === lastSide) {
                sideStreak++;
                if (sideStreak > 3) {
                    currentSide = (lastSide === "左") ? "右" : "左";
                    sideStreak = 1; 
                }
            } else {
                sideStreak = 1;
            }
            lastSide = currentSide;

            let isLeft = (currentSide === "左");
            let baseSpeed = 4 + Math.random() * 2; 
            
            notes.push({
                x: isLeft ? canvas.width * 0.25 : canvas.width * 0.75,
                y: -30,
                type: isLeft ? "左揮拳" : "right", 
                // 🎯 融入難度基礎速度：簡單 *0.75，普通 *1.0，困難 *1.35
                speed: baseSpeed * speedMultiplier * difficultySpeedBase, 
                active: true
            });
            spawnedBalloonsCount++; 
        }
    }
}

async function predict() {
    if (!isGameRunning) return;
    
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
    const prediction = await model.predict(posenetOutput);

    let highestPred = "準備";
    let highestVal = 0;
    for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > highestVal) {
            highestVal = prediction[i].probability;
            highestPred = prediction[i].className;
        }
    }

    const labelContainer = document.getElementById("label-container");
    let emoji = highestPred === "準備" ? "🧘 準備" : (highestPred === "左揮拳" ? "🥊 左" : "🥊 右");
    labelContainer.innerText = `${emoji} (${(highestVal * 100).toFixed(0)}%)`;

    if (highestVal > 0.80) {
        let oldStatus = lastStatus;
        lastStatus = highestPred;

        if (oldStatus === "準備" && lastStatus !== "準備" && !isPunchCooldown) {
            checkHit(lastStatus); 
            isPunchCooldown = true;
            setTimeout(() => { isPunchCooldown = false; }, 350); 
        }
    }
}

function drawRingBackground() {
    ctx.fillStyle = "#090c15";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let floorGrad = ctx.createLinearGradient(0, canvas.height * 0.4, 0, canvas.height);
    floorGrad.addColorStop(0, "#0f1322"); 
    floorGrad.addColorStop(1, "#18143a"); 
    ctx.fillStyle = floorGrad;
    
    ctx.beginPath();
    ctx.moveTo(canvas.width * 0.25, canvas.height * 0.4);
    ctx.lineTo(canvas.width * 0.75, canvas.height * 0.4);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
    ctx.lineWidth = 2;
    for(let i = 0; i <= 10; i++) {
        ctx.beginPath();
        ctx.moveTo(canvas.width * 0.1 * i, canvas.height);
        ctx.lineTo(canvas.width * 0.35 + (canvas.width * 0.03 * i), canvas.height * 0.4);
        ctx.stroke();
    }

    ctx.strokeStyle = "rgba(239, 68, 68, 0.4)"; 
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, canvas.height*0.35); ctx.lineTo(canvas.width*0.25, canvas.height*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, canvas.height*0.55); ctx.lineTo(canvas.width*0.13, canvas.height*0.68); ctx.stroke();

    ctx.strokeStyle = "rgba(14, 165, 233, 0.4)"; 
    ctx.beginPath(); ctx.moveTo(canvas.width, canvas.height*0.35); ctx.lineTo(canvas.width*0.75, canvas.height*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(canvas.width, canvas.height*0.55); ctx.lineTo(canvas.width*0.87, canvas.height*0.68); ctx.stroke();
}

function drawGame() {
    drawRingBackground();

    ctx.save();
    ctx.globalAlpha = 0.25; 
    ctx.drawImage(webcam.canvas, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    ctx.strokeStyle = "rgba(250, 204, 21, 0.7)"; 
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(0, targetY);
    ctx.lineTo(canvas.width, targetY);
    ctx.stroke();

    ctx.fillStyle = lastStatus === "左揮拳" ? "rgba(34, 211, 238, 0.85)" : "rgba(34, 211, 238, 0.15)";
    ctx.strokeStyle = "#22d3ee";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(canvas.width * 0.25, targetY, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = (lastStatus === "右揮拳" || lastStatus === "right") ? "rgba(244, 63, 94, 0.85)" : "rgba(244, 63, 94, 0.15)";
    ctx.strokeStyle = "#f43f5e";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(canvas.width * 0.75, targetY, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    for (let i = notes.length - 1; i >= 0; i--) {
        let note = notes[i];
        note.y += note.speed; 

        if (note.active) {
            ctx.fillStyle = note.type === "左揮拳" ? "#22d3ee" : "#f43f5e";
            ctx.shadowBlur = 15; 
            ctx.shadowColor = note.type === "左揮拳" ? "#22d3ee" : "#f43f5e";
            
            ctx.beginPath();
            ctx.ellipse(note.x, note.y, 30, 36, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; 
            
            ctx.strokeStyle = "rgba(255,255,255,0.6)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(note.x, note.y + 36);
            ctx.lineTo(note.x, note.y + 50);
            ctx.stroke();
        }

        if (note.y > canvas.height + 50) {
            notes.splice(i, 1);
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.04; 

        if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
        }

        ctx.fillStyle = p.color === "left" ? `rgba(34, 211, 238, ${p.alpha})` : `rgba(244, 63, 94, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function checkHit(punchType) {
    for (let note of notes) {
        if (note.active && (note.type === punchType || (note.type === "right" && punchType === "右揮拳"))) {
            let distance = Math.abs(note.y - targetY);
            
            if (distance < 60) {
                score += 10;
                note.active = false; 
                document.getElementById("score-display").innerText = score + " / " + targetMaxScore;
                
                playHitSound(); 
                
                createExplosion(note.x, note.y, note.type === "左揮拳" ? "left" : "right");
                break;
            }
        }
    }
}

function createExplosion(x, y, side) {
    for (let i = 0; i < 18; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            size: 3 + Math.random() * 5,
            color: side,
            alpha: 1.0
        });
    }
}
</script>
