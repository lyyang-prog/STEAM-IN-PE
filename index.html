<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 節奏打擊王 - 70% 頂級拳館版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <style>
        body {
            /* 網頁全景背景：模擬拳擊館暗處與探照燈光感 */
            background: radial-gradient(circle at center, #1e1b4b 0%, #090d16 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        main {
            width: 95%;
            max-width: 1100px;
            text-align: center;
            /* 拳擊館高級毛玻璃外殼 */
            background: rgba(30, 41, 59, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 30px;
            /* 帥氣的兩側霓虹陰影：左藍右紅 */
            box-shadow: -10px 10px 40px rgba(34, 211, 238, 0.15), 10px 10px 40px rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            color: #fd0054; /* 充滿侵略性的格鬥紅 */
            text-shadow: 0 0 10px rgba(253, 0, 84, 0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 10px 0;
            font-weight: 900;
        }

        button {
            width: 280px;
            padding: 16px;
            /* 拳王金腰帶金屬漸層 */
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #0f172a;
            border: none;
            border-radius: 50px; /* 膠囊圓角 */
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
            margin-bottom: 12px;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.96);
            box-shadow: 0 0 5px rgba(245, 158, 11, 0.2);
        }

        #status {
            font-size: 0.9rem;
            color: #a7f3d0; /* 柔和的準備綠 */
            text-shadow: 0 0 8px rgba(167, 243, 208, 0.5);
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: bold;
            height: 20px;
            letter-spacing: 1px;
        }

        /* 🎯 更新：符合你要求的 70% 畫面比例容器 */
        .canvas-container {
            width: 75vw;
            height: 55vh;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            /* 金屬質感邊框 */
            border: 4px solid #475569;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 15px 35px rgba(0,0,0,0.6);
            line-height: 0;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* 下方數據看板美化 */
        .score-card {
            margin-top: 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 75vw;
        }

        .score-box {
            text-align: center;
            flex: 1;
        }

        .label {
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        #score-display {
            font-size: 2.2rem;
            margin: 0;
            color: #4ade80; 
            font-weight: 900;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.4);
        }

        #time-display {
            font-size: 2.2rem;
            margin: 0;
            color: #f59e0b; 
            font-weight: 900;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        #label-container {
            font-size: 1.1rem;
            color: #38bdf8;
            font-weight: 800;
            margin-top: 5px;
        }

        /* 終極結算黑屏 */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(9, 13, 22, 0.96);
            border-radius: 30px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #game-over-screen h2 {
            color: #ef4444;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        #final-score {
            font-size: 4rem;
            color: #4ade80;
            font-weight: 900;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.6);
        }
    </style>
</head>
<body>
    <main>
        <h1>🥊 AI BOXING ARENA 🥊</h1>
        <button type="button" id="start-btn" onclick="initOrRestart()">ENTER RING</button>
        <div id="status">Ready for Round 1</div>
        
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="score-card">
            <div class="score-box">
                <div class="label">TOTAL SCORE</div>
                <h2 id="score-display">0 / 500</h2>
            </div>
            <div class="score-box" style="border-left: 1px solid #334155; border-right: 1px solid #334155;">
                <div class="label">ROUND TIME</div>
                <h2 id="time-display">60s</h2>
            </div>
            <div class="score-box">
                <div class="label">BOXER STATUS</div>
                <div id="label-container">Waiting...</div>
            </div>
        </div>

        <div id="game-over-screen">
            <h2>K.O. TIME UP!</h2>
            <div class="label">FINAL MATCH SCORE</div>
            <div id="final-score">0</div>
            <button type="button" style="background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); color: #000; box-shadow: 0 0 20px rgba(74,222,128,0.4);" onclick="resetGame()">NEXT ROUND</button>
        </div>
    </main>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/Bcp6i6fs_/";

let model, webcam, ctx, canvas, maxPredictions;

let score = 0;
let lastStatus = "準備"; 
let isPunchCooldown = false;
let isGameRunning = false;
let isCameraInitialized = false; 

let notes = [];       
let particles = [];   
let targetY;          

let timeLeft = 60;
let timerInterval = null;
let speedMultiplier = 1.0; 

// 固定 50 顆氣球，總分 500 分
const TOTAL_BALLOONS = 50;
let spawnedBalloonsCount = 0;
let balloonSpawnTimeline = []; 

function generateRandomTimeline() {
    balloonSpawnTimeline = [];
    spawnedBalloonsCount = 0;
    for (let i = 0; i < TOTAL_BALLOONS; i++) {
        let randomSecond = 1.5 + Math.random() * 52.5;
        balloonSpawnTimeline.push(randomSecond);
    }
    balloonSpawnTimeline.sort((a, b) => a - b);
}

async function initOrRestart() {
    const startBtn = document.getElementById("start-btn");
    const statusDiv = document.getElementById("status");
    
    startBtn.style.display = "none"; 

    if (isCameraInitialized) {
        startGameLogic();
        return;
    }

    statusDiv.innerText = "正在點亮拳館燈光 (啟動鏡頭)...";
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    try {
        canvas = document.getElementById("canvas");
        canvas.width = 800;
        canvas.height = 600;
        ctx = canvas.getContext("2d");
        targetY = canvas.height * 0.8; 
        
        const size = 400;
        const flip = true; 
        webcam = new tmPose.Webcam(size, size, flip); 
        
        await webcam.setup({ facingMode: "user" }); 
        await webcam.play();
        
        statusDiv.innerText = "裁判已就位，正在讀取 AI 動作模組...";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        isCameraInitialized = true;
        startGameLogic();
    } catch (e) {
        console.error(e);
        statusDiv.innerText = "錯誤: 無法進入拳擊館 (鏡頭開啟失敗)。";
        startBtn.style.display = "block";
    }
}

function startGameLogic() {
    const statusDiv = document.getElementById("status");
    statusDiv.innerText = "🥊 ROUND 1 - 鈴聲響起，開打！";
    
    score = 0;
    timeLeft = 60;
    speedMultiplier = 1.0;
    notes = [];
    particles = [];
    
    generateRandomTimeline(); 
    
    document.getElementById("score-display").innerText = "0 / 500";
    document.getElementById("time-display").innerText = timeLeft + "s";
    document.getElementById("time-display").style.color = "#f59e0b"; 
    document.getElementById("game-over-screen").style.display = "none";

    isGameRunning = true;
    
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time-display").innerText = timeLeft + "s";
        speedMultiplier = 1.0 + (60 - timeLeft) * 0.035; 
        
        if (timeLeft <= 10) {
            document.getElementById("time-display").style.color = "#ef4444";
        }

        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);

    window.requestAnimationFrame(gameLoop);
}

function endGame() {
    isGameRunning = false;
    clearInterval(timerInterval);
    document.getElementById("status").innerText = "🔔 賽事結束！";
    document.getElementById("final-score").innerText = score + " / 500";
    document.getElementById("game-over-screen").style.display = "flex";
}

function resetGame() {
    document.getElementById("game-over-screen").style.display = "none";
    startGameLogic();
}

async function gameLoop(timestamp) {
    if (!isGameRunning) return;

    webcam.update(); 
    await predict(); 
    updateAndSpawnLogic(); 
    drawGame();      
    
    window.requestAnimationFrame(gameLoop);
}

function updateAndSpawnLogic() {
    let currentElapsedSecond = 60 - timeLeft; 
    
    if (spawnedBalloonsCount < TOTAL_BALLOONS) {
        let nextSpawnTime = balloonSpawnTimeline[spawnedBalloonsCount];
        
        if (currentElapsedSecond >= nextSpawnTime) {
            let isLeft = Math.random() > 0.5; 
            let baseSpeed = 4 + Math.random() * 2; 
            
            notes.push({
                x: isLeft ? canvas.width * 0.25 : canvas.width * 0.75,
                y: -30,
                type: isLeft ? "左揮拳" : "右揮拳",
                speed: baseSpeed * speedMultiplier, 
                active: true
            });
            spawnedBalloonsCount++; 
        }
    }
}

async function predict() {
    if (!isGameRunning) return;
    
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
    const prediction = await model.predict(posenetOutput);

    let highestPred = "準備";
    let highestVal = 0;
    for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > highestVal) {
            highestVal = prediction[i].probability;
            highestPred = prediction[i].className;
        }
    }

    const labelContainer = document.getElementById("label-container");
    let emoji = highestPred === "準備" ? "🧘 準備" : (highestPred === "左揮拳" ? "🥊 左拳" : "🥊 右拳");
    labelContainer.innerText = `${emoji} (${(highestVal * 100).toFixed(0)}%)`;

    if (highestVal > 0.80) {
        let oldStatus = lastStatus;
        lastStatus = highestPred;

        if (oldStatus === "準備" && lastStatus !== "準備" && !isPunchCooldown) {
            checkHit(lastStatus); 
            isPunchCooldown = true;
            setTimeout(() => { isPunchCooldown = false; }, 350); 
        }
    }
}

function drawRingBackground() {
    // 拳擊館暗色基底
    ctx.fillStyle = "#0c111d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 擂台立體木拼地板漸層
    let floorGrad = ctx.createLinearGradient(0, canvas.height * 0.4, 0, canvas.height);
    floorGrad.addColorStop(0, "#111827"); 
    floorGrad.addColorStop(1, "#1e1b4b"); 
    ctx.fillStyle = floorGrad;
    
    ctx.beginPath();
    ctx.moveTo(canvas.width * 0.25, canvas.height * 0.4);
    ctx.lineTo(canvas.width * 0.75, canvas.height * 0.4);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.closePath();
    ctx.fill();

    // 擂台網格透視線（更顯精緻）
    ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
    ctx.lineWidth = 2;
    for(let i = 0; i <= 10; i++) {
        ctx.beginPath();
        ctx.moveTo(canvas.width * 0.1 * i, canvas.height);
        ctx.lineTo(canvas.width * 0.35 + (canvas.width * 0.03 * i), canvas.height * 0.4);
        ctx.stroke();
    }

    // 左邊紅色角落繩索
    ctx.strokeStyle = "rgba(239, 68, 68, 0.5)"; 
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, canvas.height*0.35); ctx.lineTo(canvas.width*0.25, canvas.height*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, canvas.height*0.55); ctx.lineTo(canvas.width*0.13, canvas.height*0.68); ctx.stroke();

    // 右邊藍色角落繩索
    ctx.strokeStyle = "rgba(14, 165, 233, 0.5)"; 
    ctx.beginPath(); ctx.moveTo(canvas.width, canvas.height*0.35); ctx.lineTo(canvas.width*0.75, canvas.height*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(canvas.width, canvas.height*0.55); ctx.lineTo(canvas.width*0.87, canvas.height*0.68); ctx.stroke();

    // 頂部雷射光舞台特效
    let lightGrad = ctx.createRadialGradient(canvas.width/2, canvas.height*0.1, 5, canvas.width/2, canvas.height*0.1, 400);
    lightGrad.addColorStop(0, "rgba(253, 0, 84, 0.12)");
    lightGrad.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = lightGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawGame() {
    drawRingBackground();

    ctx.save();
    ctx.globalAlpha = 0.28; 
    ctx.drawImage(webcam.canvas, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    // 金光閃閃判定線
    ctx.strokeStyle = "rgba(234, 179, 8, 0.7)"; 
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(0, targetY);
    ctx.lineTo(canvas.width, targetY);
    ctx.stroke();

    // 左右打擊目標靶圈
    ctx.fillStyle = lastStatus === "左揮拳" ? "rgba(34, 211, 238, 0.85)" : "rgba(34, 211, 238, 0.15)";
    ctx.strokeStyle = "#22d3ee";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(canvas.width * 0.25, targetY, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = lastStatus === "右揮拳" ? "rgba(244, 63, 94, 0.85)" : "rgba(244, 63, 94, 0.15)";
    ctx.strokeStyle = "#f43f5e";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(canvas.width * 0.75, targetY, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 氣球發光與描邊繪製
    for (let i = notes.length - 1; i >= 0; i--) {
        let note = notes[i];
        note.y += note.speed; 

        if (note.active) {
            ctx.fillStyle = note.type === "左揮拳" ? "#22d3ee" : "#f43f5e";
            ctx.shadowBlur = 15; 
            ctx.shadowColor = note.type === "左揮拳" ? "#22d3ee" : "#f43f5e";
            
            ctx.beginPath();
            ctx.ellipse(note.x, note.y, 30, 36, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; 
            
            ctx.strokeStyle = "rgba(255,255,255,0.6)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(note.x, note.y + 36);
            ctx.lineTo(note.x, note.y + 50);
            ctx.stroke();
        }

        if (note.y > canvas.height + 50) {
            notes.splice(i, 1);
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.04; 

        if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
        }

        ctx.fillStyle = p.color === "left" ? `rgba(34, 211, 238, ${p.alpha})` : `rgba(244, 63, 94, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function checkHit(punchType) {
    for (let note of notes) {
        if (note.active && note.type === punchType) {
            let distance = Math.abs(note.y - targetY);
            
            if (distance < 60) {
                score += 10;
                note.active = false; 
                document.getElementById("score-display").innerText = score + " / 500";
                
                createExplosion(note.x, note.y, punchType === "左揮拳" ? "left" : "right");
                break;
            }
        }
    }
}

function createExplosion(x, y, side) {
    for (let i = 0; i < 18; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            size: 3 + Math.random() * 5,
            color: side,
            alpha: 1.0
        });
    }
}
</script>
</body>
</html>
