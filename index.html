<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Power Coach</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <style>
        /* 直接把運動風寫在這裡，確保一定會更新 */
        body {
            background-color: #0f172a; /* 深藍黑色底 */
            color: #f8fafc;
            font-family: 'Orbitron', sans-serif, "Microsoft JhengHei";
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        main {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: #22d3ee; /* 螢光藍 */
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        button {
            width: 100%;
            padding: 18px;
            background: #22d3ee;
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
            margin-bottom: 15px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.6);
        }

        #status {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border: 4px solid #334155;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stats-panel {
            margin-top: 25px;
            background: rgba(30, 41, 59, 0.7);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        #score-display {
            font-size: 5rem;
            margin: 0;
            color: #4ade80; /* 螢光綠 */
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
        }

        .score-label {
            font-size: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        #label-container {
            margin-top: 10px;
            font-size: 1.1rem;
            color: #22d3ee;
        }
    </style>
</head>
<body>
    <main>
        <h1>Power AI</h1>
        <button type="button" onclick="init()">START WORKOUT</button>
        <div id="status">READY TO TRAIN</div>
        
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="stats-panel">
            <div class="score-label">Total Reps</div>
            <h2 id="score-display">0</h2>
            <div id="label-container">Position Detect</div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
