<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Power Coach</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

        body {
            background-color: #0f172a; /* 極致深藍黑 */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        main {
            width: 90%;
            max-width: 400px;
            text-align: center;
            background: #1e293b;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.5rem;
            color: #22d3ee; /* 螢光電藍 */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #22d3ee 0%, #0ea5e9 100%);
            color: #0f172a;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(34, 211, 238, 0.3);
            margin-bottom: 10px;
        }

        #status {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #334155;
            line-height: 0;
        }

        canvas {
            width: 100%;
            height: 100%;
        }
