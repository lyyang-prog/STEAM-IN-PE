<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 氣球打擊王 - 50% 黃金視野版</title>
    <!-- 載入 Google 官方 TensorFlow & tmPose 套件 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    
    <style>
        body {
            /* 全螢幕拳擊館奢華深色背景 */
            background: radial-gradient(circle at center, #1a102f 0%, #05070c 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        main {
            width: 95%;
            max-width: 800px;
            text-align: center;
            /* 輕量級高質感毛玻璃容器 */
            background: rgba(20, 26, 44, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.6rem;
            color: #ffde59; /* 耀眼冠軍金 */
            text-shadow: 0 0 12px rgba(255, 222, 89, 0.5);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0 0 8px 0;
            font-weight: 900;
        }

        button {
            width: 240px;
            padding: 12px;
            background: linear-gradient(135deg, #ffde59 0%, #ff914d 100%);
            color: #05070c;
            border: none;
            border-radius: 50px; 
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 145, 77, 0.4);
            margin-bottom: 10px;
            transition: all 0.15s ease;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.96);
        }

        #status {
            font-size: 0.85rem;
            color: #93c5fd; 
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
            height: 18px;
            letter-spacing: 1px;
        }

        /* 頂部數據看板：現在放在畫布上方，更符合視覺動線 */
        .score-card {
            margin-bottom: 10px;
            background: rgba(9, 11, 20, 0.85);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 55vw; /* 配合 50% 視野做微調縮放 */
        }

        .score-box {
            text-align: center;
            flex: 1;
        }

        .label {
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 1px;
            margin-bottom: 2px;
            font-weight: 600;
        }

        #score-display {
            font-size: 1.8rem;
            margin: 0;
            color: #4ade80; 
            font-weight: 900;
        }

        #time-display {
            font-size: 1.8rem;
            margin: 0;
            color: #ff914d; 
            font-weight: 900;
        }

        #label-container {
            font-size: 0.95rem;
            color: #22d3ee;
            font-weight: 800;
        }

        /* 🎯 關鍵更新：完美 50% 比例容器，視野集中不失真 */
        .canvas-container {
            width: 55vw;
            height: 42vh;
            background: #020617;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #475569;
            box-sizing: border-box;
            line-height: 0;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* 挑戰完成黑屏覆蓋層 */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 12, 0.97);
            border-radius: 24px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #game-over-screen h2 {
            color: #ef4444;
            font-size: 2.2rem;
            margin: 0 0 8px 0;
            text-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
        }

        #final-score {
            font-size: 3.5rem;
            color: #4ade80;
            font-weight: 900;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <main>
        <h1>🎈 氣球打擊王 🎈</h1>
        <button type="button" id="start-btn" onclick="initOrRestart()">開始挑戰</button>
        <div id="status">Ready to Boxing</div>
        
        <!-- 看板往上移，出拳時眼角餘光就能直接看到時間 -->
        <div class="score-card">
            <div class="score-box">
                <div class="label">當前得分</div>
                <h2 id="score-display">0 / 500</h2>
            </div>
            <div class="score-box" style="border-left: 1px solid #273549; border-right: 1px solid #273549;">
                <div class="label">剩餘時間</div>
                <h2 id="time-display">60s</h2>
            </div>
            <div class="score-box">
                <div class="label">AI 動作偵測</div>
                <div id="label-container">等待中...</div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <!-- 結算畫面 -->
        <div id="game-over-screen">
            <h2>K.O. 挑戰結束</h2>
            <div class="label">最終格鬥總分</div>
            <div id="final-score">0</div>
            <button type="button" style="background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); color: #000;" onclick="resetGame()">再挑戰一次</button>
        </div>
    </main>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/Bcp6i6fs_/";

let model, webcam, ctx, canvas, maxPredictions;

let score = 0;
let lastStatus = "準備"; 
let isPunchCooldown = false;
let isGameRunning = false;
let isCameraInitialized = false; 

let notes = [];       
let particles = [];   
let targetY;          

let timeLeft = 60;
let timerInterval = null;
let speedMultiplier = 1.0; 

// 依然保持你最愛的：一局固定 50 顆氣球，滿分 500 分公平競賽機制
const TOTAL_BALLOONS = 50;
let spawnedBalloonsCount = 0;
let balloonSpawnTimeline = []; 

function generateRandomTimeline() {
    balloonSpawnTimeline = [];
    spawnedBalloonsCount = 0;
    for (let i = 0; i < TOTAL_BALLOONS; i++) {
        let randomSecond = 1.5 + Math.random() * 52.5;
        balloonSpawnTimeline.push(randomSecond);
    }
    balloonSpawnTimeline.sort((a, b) => a - b);
}

async function initOrRestart() {
    const startBtn = document.getElementById("start-btn");
    const statusDiv = document.getElementById("status");
    
    startBtn.style.display = "none"; 

    if (isCameraInitialized) {
        startGameLogic();
        return;
    }

    statusDiv.innerText = "正在點亮拳館燈光 (開啟鏡頭)...";
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    try {
        canvas = document.getElementById("canvas");
        canvas.width = 800;
        canvas.height = 600;
        ctx = canvas.getContext("2d");
        targetY = canvas.height * 0.8; 
        
        const size = 400;
        const flip = true; 
        webcam = new tmPose.Webcam(size, size, flip); 
        
        await webcam.setup({ facingMode: "user" }); 
        await webcam.play();
        
        statusDiv.innerText = "裁判就位，正在讀取 AI 動作模組...";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        isCameraInitialized = true;
        startGameLogic();
    } catch (e) {
        console.error(e);
        statusDiv.innerText = "錯誤: 無法開啟鏡頭。";
        startBtn.style.display = "block";
    }
}

function startGameLogic() {
    const statusDiv = document.getElementById("status");
    statusDiv.innerText = "🥊 氣球打擊王 - 比賽開始！";
    
    score = 0;
    timeLeft = 60;
    speedMultiplier = 1.0;
    notes = [];
    particles = [];
    
    generateRandomTimeline(); 
    
    document.getElementById("score-display").innerText = "0 / 500";
    document.getElementById("time-display").innerText = timeLeft + "s";
    document.getElementById("time-display").style.color = "#ff914d"; 
    document.getElementById("game-over-screen").style.display = "none";

    isGameRunning = true;
    
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time-display").innerText = timeLeft + "s";
        
        // 速度加乘曲線：前慢後快
        speedMultiplier = 1.0 + (60 - timeLeft) * 0.035; 
        
        if (timeLeft <= 10) {
            document.getElementById("time-display").style.color = "#ef4444";
        }

        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);

    window.requestAnimationFrame(gameLoop);
}

function endGame() {
    isGameRunning = false;
    clearInterval(timerInterval);
    document.getElementById("status").innerText = "🔔 挑戰結束！";
    document.getElementById("final-score").innerText = score + " / 500";
    document.getElementById("game-over-screen").style.display = "flex";
}

function resetGame() {
    document.getElementById("game-over-screen").style.display = "none";
    startGameLogic();
}

async function gameLoop(timestamp) {
    if (!isGameRunning) return;

    webcam.update(); 
    await predict(); 
    updateAndSpawnLogic(); 
    drawGame();      
    
    window.requestAnimationFrame(gameLoop);
}

function updateAndSpawnLogic() {
    let currentElapsedSecond = 60 - timeLeft; 
    
    if (spawnedBalloonsCount < TOTAL_BALLOONS) {
        let nextSpawnTime = balloonSpawnTimeline[spawnedBalloonsCount];
        
        if (currentElapsedSecond >= nextSpawnTime) {
            let isLeft = Math.random() > 0.5; 
            let baseSpeed = 4 + Math.random() * 2; 
            
            notes.push({
                x: isLeft ? canvas.width * 0.25 : canvas.width * 0.75,
                y: -30,
                type: isLeft ? "左揮拳" : "右揮拳",
                speed: baseSpeed * speedMultiplier, 
                active: true
            });
            spawnedBalloonsCount++; 
        }
    }
}

async function predict() {
    if (!isGameRunning) return;
    
    const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
    const prediction = await model.predict(posenetOutput);

    let highestPred = "準備";
    let highestVal = 0;
    for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > highestVal) {
            highestVal = prediction[i].probability;
            highestPred = prediction[i].className;
        }
    }

    const labelContainer = document.getElementById("label-container");
    let emoji = highestPred === "準備" ? "🧘 準備" : (highestPred === "左揮拳" ? "🥊 左" : "🥊 右");
    labelContainer.innerText = `${emoji} (${(highestVal * 100).toFixed(0)}%)`;

    if (highestVal > 0.80) {
        let oldStatus = lastStatus;
        lastStatus = highestPred;

        if (oldStatus === "準備" && lastStatus !== "準備" && !isPunchCooldown) {
            checkHit(lastStatus); 
            isPunchCooldown = true;
            setTimeout(() => { isPunchCooldown = false; }, 350); 
        }
    }
}

function drawRingBackground() {
    // 專業拳館高級深色調
    ctx.fillStyle = "#090c15";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 擂台立體拼木地板
    let floorGrad = ctx.createLinearGradient(0, canvas.height * 0.4, 0, canvas.height);
    floorGrad.addColorStop(0, "#0f1322"); 
    floorGrad.addColorStop(1, "#18143a"); 
    ctx.fillStyle = floorGrad;
    
    ctx.beginPath();
    ctx.moveTo(canvas.width * 0.25, canvas.height * 0.4);
    ctx.lineTo(canvas.width * 0.75, canvas.height * 0.4);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.closePath();
    ctx.fill();

    // 擂台透視線
    ctx.strokeStyle = "rgba(255, 255, 255, 0.02)";
    ctx.lineWidth = 2;
    for(let i = 0; i <= 10; i++) {
        ctx.beginPath();
        ctx.moveTo(canvas.width * 0.1 * i, canvas.height);
        ctx.lineTo(canvas.width * 0.35 + (canvas.width * 0.03 * i), canvas.height * 0.4);
        ctx.stroke();
    }

    // 左紅角落圍欄繩索
    ctx.strokeStyle = "rgba(239, 68, 68, 0.4)"; 
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, canvas.height*0.35); ctx.lineTo(canvas.width*0.25, canvas.height*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, canvas.height*0.55); ctx.lineTo(canvas.width*0.13, canvas.height*0.68); ctx.stroke();

    // 右藍角落圍欄繩索
    ctx.strokeStyle = "rgba(14, 165, 233, 0.4)"; 
    ctx.beginPath(); ctx.moveTo(canvas.width, canvas.height*0.35); ctx.lineTo(canvas.width*0.75, canvas.height*0.4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(canvas.width, canvas.height*0.55); ctx.lineTo(canvas.width*0.87, canvas.height*0.68); ctx.stroke();
}

function drawGame() {
    drawRingBackground();

    ctx.save();
    ctx.globalAlpha = 0.25; 
    ctx.drawImage(webcam.canvas, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    // 金黃色格鬥打擊線
    ctx.strokeStyle = "rgba(250, 204, 21, 0.7)"; 
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(0, targetY);
    ctx.lineTo(canvas.width, targetY);
    ctx.stroke();

    // 左右打擊靶圈
    ctx.fillStyle = lastStatus === "左揮拳" ? "rgba(34, 211, 238, 0.85)" : "rgba(34, 211, 238, 0.15)";
    ctx.strokeStyle = "#22d3ee";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(canvas.width * 0.25, targetY, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = lastStatus === "右揮拳" ? "rgba(244, 63, 94, 0.85)" : "rgba(244, 63, 94, 0.15)";
    ctx.strokeStyle = "#f43f5e";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(canvas.width * 0.75, targetY, 45, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 氣球渲染與發光
    for (let i = notes.length - 1; i >= 0; i--) {
        let note = notes[i];
        note.y += note.speed; 

        if (note.active) {
            ctx.fillStyle = note.type === "左揮拳" ? "#22d3ee" : "#f43f5e";
            ctx.shadowBlur = 15; 
            ctx.shadowColor = note.type === "左揮拳" ? "#22d3ee" : "#f43f5e";
            
            ctx.beginPath();
            ctx.ellipse(note.x, note.y, 30, 36, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; 
            
            ctx.strokeStyle = "rgba(255,255,255,0.6)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(note.x, note.y + 36);
            ctx.lineTo(note.x, note.y + 50);
            ctx.stroke();
        }

        if (note.y > canvas.height + 50) {
            notes.splice(i, 1);
        }
    }

    // 擊破粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.04; 

        if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
        }

        ctx.fillStyle = p.color === "left" ? `rgba(34, 211, 238, ${p.alpha})` : `rgba(244, 63, 94, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function checkHit(punchType) {
    for (let note of notes) {
        if (note.active && note.type === punchType) {
            let distance = Math.abs(note.y - targetY);
            
            if (distance < 60) {
                score += 10;
                note.active = false; 
                document.getElementById("score-display").innerText = score + " / 500";
                
                createExplosion(note.x, note.y, punchType === "左揮拳" ? "left" : "right");
                break;
            }
        }
    }
}

function createExplosion(x, y, side) {
    for (let i = 0; i < 18; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            size: 3 + Math.random() * 5,
            color: side,
            alpha: 1.0
        });
    }
}
</script>
</body>
</html>
